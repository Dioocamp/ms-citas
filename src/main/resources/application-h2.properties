# ====================================================================
#  PERFIL 'h2'  ->  Base de datos embebida en memoria (sin instalar nada)
#  Activar con:  mvn spring-boot:run -Dspring-boot.run.profiles=h2
# ====================================================================
spring.application.name=ms-citas
server.port=8082

# --- Conexion a H2 (en memoria) -------------------------------------
spring.datasource.url=jdbc:h2:mem:clinica_citas;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate -------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# --- Consola web de H2:  http://localhost:8082/h2-console -----------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Comunicacion con ms-personal-medico ----------------------------
ms.personal-medico.url=${MS_PERSONAL_MEDICO_URL:http://localhost:8081}

springdoc.swagger-ui.path=/swagger-ui.html
