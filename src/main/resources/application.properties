# ====================================================================
#  PERFIL POR DEFECTO  ->  MySQL (base de datos relacional principal)
# ====================================================================
spring.application.name=ms-citas
server.port=8082

# --- Conexion a MySQL ------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/clinica_citas?createDatabaseIfNotExist=true&serverTimezone=America/Santiago&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate -------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.sql.init.mode=never

# --- Comunicacion con el microservicio de Personal Medico -----------
ms.personal-medico.url=http://localhost:8081

# --- Documentacion OpenAPI / Swagger UI -----------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
