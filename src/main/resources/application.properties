# ====================================================================
#  PERFIL POR DEFECTO  ->  MySQL (base de datos relacional principal)
#
#  Toda la configuracion dependiente del entorno se externaliza en
#  variables de entorno (12-factor): en desarrollo local aplican los
#  valores por defecto y en Docker/Swarm/nube se inyectan desde el
#  docker-compose.yml o el pipeline CI/CD.
# ====================================================================
spring.application.name=ms-citas
server.port=${SERVER_PORT:8082}

# --- Conexion a MySQL ------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/clinica_citas?createDatabaseIfNotExist=true&serverTimezone=America/Santiago&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate -------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.sql.init.mode=never

# --- Comunicacion con el microservicio de Personal Medico -----------
ms.personal-medico.url=${MS_PERSONAL_MEDICO_URL:http://localhost:8081}

# --- Actuator: health check para Docker / Swarm ----------------------
# El HEALTHCHECK del Dockerfile consulta /actuator/health.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# --- Notificaciones asincronas (cola SQS en AWS) ----------------------
# Con NOTIFICACIONES_ENABLED=true se crea el cliente SQS y cada cita
# creada publica un evento CITA_CREADA en la cola.
clinica.notificaciones.enabled=${NOTIFICACIONES_ENABLED:false}
clinica.notificaciones.queue-url=${NOTIFICACIONES_QUEUE_URL:}

# --- Proteccion de acceso via API Gateway ----------------------------
# Si GATEWAY_SECRET esta definido, toda peticion a /api/** debe traer la
# cabecera 'x-gateway-secret' (la inyecta el API Gateway en la integracion).
clinica.gateway.secret=${GATEWAY_SECRET:}

# --- Documentacion OpenAPI / Swagger UI -----------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
